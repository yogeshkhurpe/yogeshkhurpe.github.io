<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kids Game — Pop the Ball</title>
  <style>
    :root{--bg:#f4fbff;--card:#fff;--accent:#ff5c7a}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial;margin:0;background:var(--bg);color:#123}
    header{background:#0563bb;color:#fff;padding:14px 10px;text-align:center}
    header a{color:#fff;text-decoration:none;display:inline-block;margin-top:6px}
    .wrap{max-width:980px;margin:18px auto;padding:18px}
    .game-card{background:var(--card);border-radius:12px;padding:18px;box-shadow:0 8px 30px rgba(2,6,23,0.08)}
    .hud{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:12px}
    .score, .timer{font-weight:700;font-size:1.1rem}
    .controls{display:flex;gap:8px}
    .btn{background:var(--accent);color:#fff;border:0;padding:8px 12px;border-radius:8px;cursor:pointer}
    .game-area{position:relative;height:420px;background:linear-gradient(180deg,#dff5ff, #f8ffff);border-radius:8px;overflow:hidden}
    .target{position:absolute;width:72px;height:72px;background:radial-gradient(circle at 35% 30%,#fff 10%,#ff9aa2 30%,#ff5c7a 60%);border-radius:50%;box-shadow:0 6px 18px rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;user-select:none;touch-action:manipulation}
    .notice{font-size:0.9rem;color:#555;margin-top:10px}
    @media (max-width:600px){.game-area{height:320px}.target{width:56px;height:56px}.hud{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
  <header>
    <div style="max-width:1100px;margin:0 auto;">Pop the Ball — Kids Game<br><a href="/">Back to Home</a></div>
  </header>

  <main class="wrap">
    <div class="game-card">
      <div class="hud">
        <div>
          <div class="score">Score: <span id="score">0</span></div>
          <div class="notice">Tap/click the pink ball as it moves!</div>
        </div>
        <div class="controls">
          <div class="timer">Time: <span id="time">30</span>s</div>
          <button id="startBtn" class="btn">Start</button>
          <button id="resetBtn" class="btn" style="background:#888">Reset</button>
        </div>
      </div>

      <div id="area" class="game-area">
        <div id="target" class="target" style="left:20px;top:20px"></div>
      </div>
    </div>
  </main>

  <script>
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const target = document.getElementById('target');
    const area = document.getElementById('area');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');

    let score = 0; let timeLeft = 30; let running = false; let moveInterval, countdown;

    function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min}

    function moveTarget(){
      const a = area.getBoundingClientRect();
      const t = target.getBoundingClientRect();
      const maxX = Math.max(0, a.width - t.width);
      const maxY = Math.max(0, a.height - t.height);
      const x = randInt(0, Math.floor(maxX));
      const y = randInt(0, Math.floor(maxY));
      target.style.transform = `translate(${x}px, ${y}px)`;
    }

    function startGame(){
      if(running) return;
      score = 0; timeLeft = 30; running = true; scoreEl.textContent = score; timeEl.textContent = timeLeft;
      moveTarget();
      moveInterval = setInterval(moveTarget, 700);
      countdown = setInterval(()=>{
        timeLeft -= 1; timeEl.textContent = timeLeft;
        if(timeLeft<=0) stopGame();
      },1000);
    }

    function stopGame(){ running=false; clearInterval(moveInterval); clearInterval(countdown); alert('Time up! Score: '+score); }

    target.addEventListener('click', ()=>{ if(!running) return; score++; scoreEl.textContent = score; /* small pop */ target.animate([{transform:'scale(1)'},{transform:'scale(0.85)'},{transform:'scale(1)'}],{duration:200}); moveTarget(); });

    // support touch
    target.addEventListener('touchstart', (e)=>{ e.preventDefault(); target.click(); });

    startBtn.addEventListener('click', startGame);
    resetBtn.addEventListener('click', ()=>{ clearInterval(moveInterval); clearInterval(countdown); running=false; score=0; timeLeft=30; scoreEl.textContent=0; timeEl.textContent=30; target.style.transform='translate(20px,20px)'; });

    // move once on load to center-ish
    window.addEventListener('load', ()=>{ moveTarget(); });
  </script>
</body>
</html>
